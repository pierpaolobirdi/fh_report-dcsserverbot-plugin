# fh_hook.yaml — Private FH_Report hook configuration
# Keep this file PRIVATE — do not share or publish
#
# This file is loaded automatically by fh_hook.py if present.
# If this file or fh_hook.py are absent, the plugin runs normally.
#
# PLAYER IDENTIFICATION:
#   Players are identified by their UCID (same as excluded_ucids in fh_report.yaml)
#
# OPTIONS PER PLAYER:
#   display_name     - Name to show. Empty/omitted = real name
#   rank             - Rank text to show. Empty/omitted = real rank by credits
#   show_credits     - true (default) | false = hide credits from display
#   punishment_points - Override punishment points for badge display (0 = none)
#
#   medal            - Custom emoji to show instead of the default position medal
#                      Omit or leave empty = use default (🥇🥈🥉🎖️ by position)
#                      Examples (copy/paste):
#                      # medal: "🌟"   # gold star
#                      # medal: "⭐"   # star
#                      # medal: "🏅"   # sports medal
#                      # medal: "👑"   # crown
#                      # medal: "🎯"   # target
#                      # medal: "🔱"   # trident
#                      # medal: "⚜️"   # fleur-de-lis
#                      # medal: "🦅"   # eagle
#                      # medal: "🎖️"   # military medal
#                      # medal: "💫"   # dizzy star
#
#   credits_fixed    - Fixed credits value. Overrides credits_mode.
#                      Use a number (including 0 for zero points).
#                      Omit, leave empty or set false to disable.
#
#   credits_mode     - How to calculate display credits (ignored if credits_fixed is set)
#                      real    = real credits (default if omitted)
#                      first   = always 1st place
#                      last    = always last place
#                      top     = high zone (between 1st and 3rd)
#                      mid     = middle of the table
#                      bottom  = low zone (near last)
#                      -N      = exact position N (e.g. -3 = always 3rd place)

players:
  71be6e5a09c1cd3979a8ec170fd99010:   # Pier_Paolo
    display_name: ""
    rank: ""
    show_credits: true
    punishment_points: 0
    medal: 
    credits_fixed: 
    credits_mode: -2
